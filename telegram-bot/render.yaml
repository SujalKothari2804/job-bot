services:
  - type: worker
    name: referjobs-bot
    runtime: python
    rootDir: telegram-bot
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: TG_PHONE
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_SOURCE_CHANNEL
        sync: false
      - key: TG_YOUR_CHANNEL
        sync: false
      - key: TG_REVIEWER_ID
        sync: false
      - key: TG_USERBOT_SESSION
        sync: false
      - key: TG_BOT_SESSION
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
